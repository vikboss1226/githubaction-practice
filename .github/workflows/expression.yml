name: expression-workflow
on:
  push:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        default: false
env:
  MY_NAME: muraly
  MY_JOB: Product Manager

jobs:
  echo:
    runs-on: ubuntu-latest
    environment: dev
    env:
      MY_SECRET: ${{ secrets.MY_SECRET }}
      MY_TEST: ${{ vars.MY_TEST }}
    steps:
      - name: step 1
        if: inputs.debug
        run: |
          echo "variable: $MY_TEST"
          echo "secret is: $MY_SECRET"
          echo "my test var is: $MY_TEST"
          echo "this is my job: $MY_JOB"
          echo "value of debug is : ${{inputs.debug}}"
  echo-2:
    runs-on: windows-latest
    steps:
      - name: second-job
        shell: bash
        if: inputs.debug==false
        run: |
          echo "this is $MY_NAME"
          echo "value of debug is new: ${{inputs.debug}}"
